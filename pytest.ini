[pytest]
# ============================================================================
# RAG Quality Gates — Pytest / DeepEval Configuration
# ============================================================================
# Orquestra a execução dos testes de qualidade RAG via DeepEval.
# Compatível com: pytest >= 8.0 | deepeval >= 4.0
# ============================================================================

# Descoberta de módulos — permite imports de src/
pythonpath = src

# Padrão de descoberta de testes
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output verboso para observabilidade em CI/CD
addopts =
    -v
    --tb=long
    -rA
    --strict-markers

# Marcadores customizados para filtragem seletiva na esteira
markers =
    faithfulness: Testes de Faithfulness / Groundedness — Validam que a resposta não fabrica informações.
    answer_relevance: Testes de Answer Relevance — Penalizam respostas evasivas ou tangenciais.
    context_precision: Testes de Context Precision — Avaliam o ranking dos chunks recuperados.
    context_recall: Testes de Context Recall — Validam cobertura do expected_output no contexto.
    safety: Testes de Toxicity / Bias / Hallucination — Filtros binários de segurança.
    context_relevancy: Testes de Context Relevancy — Medem ruído informacional nos chunks.
    rag_triad: Testes pertencentes à Tríade do RAG (Faithfulness + Relevance + Context).
    quality_gate: Todos os testes que compõem a barreira de qualidade automatizada.

# Logging nativo do pytest para captura em CI/CD
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
