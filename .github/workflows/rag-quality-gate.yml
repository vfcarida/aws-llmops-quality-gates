# ============================================================================
# RAG Quality Gate — GitHub Actions CI/CD Pipeline
# ============================================================================
# Executa a suíte de 14 testes DeepEval como barreira de qualidade antes
# de permitir merge em branches protegidas ou deploy em produção.
#
# Trigger: Push/PR para main/develop, ou execução manual
# LLM Judge: AWS Bedrock (Claude 3.5 Sonnet) via IAM credentials
# ============================================================================

name: "🛡️ RAG Quality Gate"

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - "pytest.ini"
  workflow_dispatch:
    inputs:
      test_markers:
        description: "Marcadores pytest para filtragem (ex: faithfulness, safety)"
        required: false
        default: "quality_gate"
      bedrock_model_id:
        description: "ID do modelo Bedrock para LLM Judge"
        required: false
        default: "anthropic.claude-3-5-sonnet-20241022-v2:0"

# Previne execuções concorrentes na mesma branch
concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  BEDROCK_MODEL_ID: ${{ github.event.inputs.bedrock_model_id || 'anthropic.claude-3-5-sonnet-20241022-v2:0' }}
  BEDROCK_REGION: ${{ vars.BEDROCK_REGION || 'us-east-1' }}

jobs:
  # ==========================================================================
  # JOB 1: Lint e validação estática
  # ==========================================================================
  lint:
    name: "🔍 Lint & Type Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências de lint
        run: pip install ruff mypy

      - name: Ruff — Linting
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff — Format Check
        run: ruff format --check src/ tests/

      - name: MyPy — Type Check
        run: mypy src/ tests/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # Type check informativo, não bloqueante

  # ==========================================================================
  # JOB 2: Quality Gate — Execução dos 14 testes DeepEval
  # ==========================================================================
  quality-gate:
    name: "🛡️ RAG Quality Gate Tests"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30  # Timeout global — testes LLM podem ser lentos
    permissions:
      id-token: write    # Para OIDC com AWS
      contents: read
      pull-requests: write  # Para comentar no PR

    steps:
      # ---------------------------------------------------------------
      # Setup
      # ---------------------------------------------------------------
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------------------------------------------------------
      # AWS Credentials — Bedrock Access
      # ---------------------------------------------------------------
      - name: Configurar AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.BEDROCK_REGION }}
          # Alternativa com chaves estáticas (comentado):
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # ---------------------------------------------------------------
      # Execução dos Testes
      # ---------------------------------------------------------------
      - name: "🧪 Executar Quality Gate — DeepEval"
        env:
          BEDROCK_MODEL_ID: ${{ env.BEDROCK_MODEL_ID }}
          BEDROCK_REGION: ${{ env.BEDROCK_REGION }}
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║       RAG QUALITY GATE — DEEPEVAL TEST SUITE            ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║ Judge Model: $BEDROCK_MODEL_ID"
          echo "║ Region:      $BEDROCK_REGION"
          echo "║ Markers:     ${{ github.event.inputs.test_markers || 'quality_gate' }}"
          echo "╚══════════════════════════════════════════════════════════╝"

          deepeval test run tests/test_rag_quality.py \
            -v \
            -m "${{ github.event.inputs.test_markers || 'quality_gate' }}" \
            --tb=long \
            2>&1 | tee quality_gate_output.log

      # ---------------------------------------------------------------
      # Artefatos e Relatórios
      # ---------------------------------------------------------------
      - name: "📊 Upload Test Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-results-${{ github.sha }}
          path: |
            quality_gate_output.log
            .deepeval_cache/
          retention-days: 30

      - name: "💬 Comentar Resultado no PR"
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('quality_gate_output.log', 'utf8');

            // Extrair resumo dos resultados
            const passedMatch = output.match(/(\d+) passed/);
            const failedMatch = output.match(/(\d+) failed/);
            const passed = passedMatch ? passedMatch[1] : '0';
            const failed = failedMatch ? failedMatch[1] : '0';

            const status = failed === '0' ? '✅' : '🚨';
            const statusText = failed === '0' ? 'PASSED' : 'FAILED';

            const body = `## ${status} RAG Quality Gate — ${statusText}

            | Metric | Result |
            |--------|--------|
            | Tests Passed | ${passed} |
            | Tests Failed | ${failed} |
            | Judge Model | \`${process.env.BEDROCK_MODEL_ID}\` |
            | Commit | \`${context.sha.substring(0, 7)}\` |

            <details>
            <summary>📋 Full Test Output</summary>

            \`\`\`
            ${output.substring(output.length - 3000)}
            \`\`\`
            </details>

            ---
            *Quality Gate powered by [DeepEval](https://github.com/confident-ai/deepeval) + AWS Bedrock*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ==========================================================================
  # JOB 3: Gate Decision — Bloqueia deploy se testes falharam
  # ==========================================================================
  gate-decision:
    name: "🚦 Gate Decision"
    runs-on: ubuntu-latest
    needs: quality-gate
    if: always()
    steps:
      - name: Verificar resultado do Quality Gate
        run: |
          if [ "${{ needs.quality-gate.result }}" != "success" ]; then
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  🚨 QUALITY GATE BLOCKED — Deploy para produção NEGADO  ║"
            echo "║                                                          ║"
            echo "║  O pipeline RAG falhou em uma ou mais asserções de       ║"
            echo "║  qualidade. Corrija as regressões antes de fazer merge.   ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            exit 1
          else
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  ✅ QUALITY GATE PASSED — Deploy para produção LIBERADO  ║"
            echo "╚══════════════════════════════════════════════════════════╝"
          fi
